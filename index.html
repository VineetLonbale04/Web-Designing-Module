<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Experiential Learning Workshop</title>
  
  <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
 <!-- Bootstrap Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <i class="bi bi-mortarboard-fill"></i> Workshop
    </a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Register</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<header>
  <h1><i class="bi bi-mortarboard-fill"></i> Experiential Learning Workshop</h1>
  <p>Learn by Doing | Limited Seats Available</p>
</header>

<section class="form-section container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8 col-sm-12">
  <form>

    <h2>Register Now</h2>

    <!-- Personal Info -->
    <div class="card">
      <h3>👤 Personal Information</h3>
      <input type="text" placeholder="Full Name" required>
      <input type="number" placeholder="Age" required>

      <div class="inline">
        <label><input type="radio" name="gender"> Male</label>
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Other</label>
      </div>

      <textarea placeholder="Address"></textarea>
      <input type="email" placeholder="Email ID" required>
      <input type="tel" placeholder="Phone Number" required>
    </div>

    <!-- Workshop Details -->
    <div class="card">
      <h3>📚 Workshop Preferences</h3>

      <label>Select Domain</label>
      <select required>
        <option value="">Choose</option>
        <option>Web Development</option>
        <option>AI & ML</option>
        <option>Cyber Security</option>
        <option>Data Science</option>
      </select>

      <label>Preferred Mode</label>
      <select>
        <option>Online</option>
        <option>Offline</option>
      </select>

    </div>

    <!-- Payment -->
    <div class="card">
      <h3>💳 Payment Details</h3>

      <label>Choose Method</label>
      <select>
        <option>Credit Card</option>
        <option>UPI</option>
        <option>Net Banking</option>
        <option>Wallet</option>
      </select>

      <input type="text" placeholder="Enter Payment ID / Card Number">
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button type="submit">Submit</button>
      <button type="reset">Clear</button>
    </div>

  </form>
</section>

<footer>
  <p>© 2026 Experiential Learning Program</p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
