<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workshop Registration with Payment</title>
</head>
<body style="font-family: Arial, sans-serif; background-color:#f4f6f8; margin:0; padding:0;">

    <div style="width:600px; margin:40px auto; background:#ffffff; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);">
        
        <h2 style="text-align:center; color:#333;">Workshop Registration</h2>
        <p style="text-align:center; color:#777;">Fill the form and complete payment</p>

        <form>

            <fieldset style="border:1px solid #ddd; padding:15px; margin-bottom:20px;">
                <legend style="font-weight:bold;">Personal Details</legend>

                <label>Full Name</label><br>
                <input type="text" placeholder="Enter your name" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Age</label><br>
                <input type="number" placeholder="Enter your age" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Gender</label><br>
                <select style="width:100%; padding:8px; margin-bottom:10px;">
                    <option>Select Gender</option>
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>

                <label>Address</label><br>
                <textarea placeholder="Enter your address" style="width:100%; padding:8px; margin-bottom:10px;"></textarea>

                <label>Phone Number</label><br>
                <input type="text" placeholder="Enter phone number" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Email Address</label><br>
                <input type="email" placeholder="Enter your email" style="width:100%; padding:8px;">
            </fieldset>

            <fieldset style="border:1px solid #ddd; padding:15px;">
                <legend style="font-weight:bold;">Payment Details</legend>

                <label>
                    <input type="radio" name="payment"> Credit Card
                </label>
                <label style="margin-left:20px;">
                    <input type="radio" name="payment"> Net Banking
                </label>

                <hr style="margin:15px 0;">

                <label>Card Number</label><br>
                <input type="text" placeholder="XXXX XXXX XXXX XXXX" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Card Holder Name</label><br>
                <input type="text" placeholder="Name on card" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Expiry Date</label><br>
                <input type="month" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>CVV</label><br>
                <input type="password" placeholder="CVV" style="width:100%; padding:8px; margin-bottom:15px;"><br>

                <label>Select Bank</label><br>
                <select style="width:100%; padding:8px; margin-bottom:10px;">
                    <option>Select Bank</option>
                    <option>SBI</option>
                    <option>HDFC</option>
                    <option>ICICI</option>
                </select>

                <label>User ID</label><br>
                <input type="text" placeholder="Enter User ID" style="width:100%; padding:8px; margin-bottom:10px;"><br>

                <label>Password</label><br>
                <input type="password" placeholder="Enter Password" style="width:100%; padding:8px;">
            </fieldset>

            <br>

            <button type="submit" style="width:100%; padding:12px; background:#007bff; color:#fff; border:none; border-radius:5px; font-size:16px;">
                Pay Now
            </button>

        </form>
    </div>

</body>
</html>
