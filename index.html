<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Workshop Registration</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .registration-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .form-section-title {
            border-left: 4px solid #764ba2;
            padding-left: 10px;
            margin-bottom: 20px;
            color: #4b306a;
            font-weight: 600;
        }
        .btn-gradient {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            color: white;
            transition: transform 0.2s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- 3. Bootstrap Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-code-slash me-2"></i>DevWorkshop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Support</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 8. Container & Grid Structure -->
    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8">
                
                <!-- 3. Bootstrap Card -->
                <div class="card registration-card p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h2 class="display-6 fw-bold">Workshop Registration</h2>
                        <p class="text-muted">Secure your spot in the upcoming masterclass</p>
                    </div>

                    <form class="needs-validation">
                        
                        <!-- Section 1: Personal Details -->
                        <div class="form-section-title">
                            <i class="bi bi-person-circle me-2"></i>Personal Details
                        </div>
                        
                        <div class="row g-3 mb-4">
                            <!-- 1. Grid: Full Name -->
                            <div class="col-md-12">
                                <label class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" placeholder="John Doe" required>
                                </div>
                            </div>

                            <!-- 1. Grid: Age and Gender -->
                            <div class="col-md-6">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" placeholder="Years">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Gender</label>
                                <select class="form-select">
                                    <option selected>Choose...</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                    <option>Other</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" placeholder="+1 234 567 890">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@example.com">
                            </div>

                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" rows="2" placeholder="Street, City, State"></textarea>
                            </div>
                        </div>

                        <!-- Section 2: Payment Details -->
                        <div class="form-section-title">
                            <i class="bi bi-credit-card me-2"></i>Payment Information
                        </div>

                        <div class="bg-light p-3 rounded-3 mb-4">
                            <div class="d-flex gap-4 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="cc" checked>
                                    <label class="form-check-label" for="cc">Credit Card</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="paymentMethod" id="nb">
                                    <label class="form-check-label" for="nb">Net Banking</label>
                                </div>
                            </div>

                            <!-- Payment Inputs -->
                            <div class="row g-3">
                                <div class="col-md-8">
                                    <label class="form-label small text-uppercase fw-bold">Card Number</label>
                                    <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small text-uppercase fw-bold">CVV</label>
                                    <input type="password" class="form-control" placeholder="***">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small text-uppercase fw-bold">Card Holder</label>
                                    <input type="text" class="form-control" placeholder="Full Name">
                                </div>
                                
                                <div class="col-md-12 mt-4 pt-2 border-top">
                                    <label class="form-label">Or Select Bank (Net Banking)</label>
                                    <select class="form-select">
                                        <option selected>Select your bank</option>
                                        <option>SBI</option>
                                        <option>HDFC</option>
                                        <option>ICICI</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 3. Bootstrap Button Component -->
                        <div class="d-grid gap-2 mt-5">
                            <button class="btn btn-lg btn-gradient" type="submit">
                                <i class="bi bi-shield-lock me-2"></i>Complete Registration
                            </button>
                            <p class="small text-center mt-2 text-muted">
                                <i class="bi bi-lock"></i> Your data is encrypted and secure.
                            </p>
                        </div>

                    </form>
                </div> <!-- End Card -->
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.min.js"></script>
</body>
</html>
